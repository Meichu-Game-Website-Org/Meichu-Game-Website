<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120">
  <defs>
    <linearGradient id="textFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.5" />
    </linearGradient>

    <linearGradient id="textStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="8.28%" stop-color="#FF0085" />
      <stop offset="50.33%" stop-color="#FF0085" stop-opacity="0.1" />
    </linearGradient>

    <style>
      .score-text {
        font-family: Arial, sans-serif;
        font-weight: 900;
        font-size: 100px;
        paint-order: stroke fill;
      }
    </style>
  </defs>

  <text 
    x="50%" y="50%" 
    text-anchor="middle" 
    dominant-baseline="central" 
    class="score-text"
    fill="url(#textFill)" 
    stroke="url(#textStroke)" 
    stroke-width="6"
  >0</text>
</svg>